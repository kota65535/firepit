vars:
  env: ""

env_files:
  - .env.root
  - "{% if env %}.env.{{ env }}{% endif %}"

tasks:
  setup:
    command: echo setup

  run:
    command: echo run
    depends_on:
      - setup
      - "{% if env %}setup{% endif %}"
      - task: "{% if env %}setup{% endif %}"
    env_files:
      - .env.task
      - "{% if env %}.env.task.{{ env }}{% endif %}"
    service:
      healthcheck:
        command: echo ok
        env_files:
          - .env.health
          - "{% if env %}.env.health.{{ env }}{% endif %}"

  with-env:
    vars:
      env: dev
    command: echo with-env
    depends_on:
      - "{% if env %}setup{% endif %}"
    env_files:
      - "{% if env %}.env.task.{{ env }}{% endif %}"
